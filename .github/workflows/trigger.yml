name: Trigger Multi-Repo Analyser

on:
  push:
    branches: [main, master, develop]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger multi-repo-analyser pipeline
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $PAT_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/Deepankar-MS/multi-repo-analyser/dispatches \
            -d '{"event_type": "project-updated", "client_payload": {"project": "project5"}}'
